# A tiny static file server that publishes the JWKS (public signing keys) the
# Temporal frontend fetches to validate JWTs. This stands in for the JWKS
# endpoint a real identity provider (Google, Keycloak, Okta) would expose.
#
# The JWKS content is NOT committed (it is generated by auth/tokengen). Create
# the ConfigMap it serves from the generated file before applying (RUNBOOK.md):
#   kubectl -n temporal create configmap jwks \
#     --from-file=jwks.json=auth/out/jwks.json
#
# Frontend reaches it at: http://temporal-jwks.temporal.svc/jwks.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-jwks
  namespace: temporal
  labels:
    app: temporal-jwks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-jwks
  template:
    metadata:
      labels:
        app: temporal-jwks
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: jwks
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      volumes:
        - name: jwks
          configMap:
            name: jwks
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-jwks
  namespace: temporal
spec:
  selector:
    app: temporal-jwks
  ports:
    - port: 80
      targetPort: 80
